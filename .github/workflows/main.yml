name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Fix package.json
      run: |
        # Remove o campo packageManager problemático
        node -e "
        const fs = require('fs');
        ['package.json', 'example/package.json'].forEach(file => {
          if (fs.existsSync(file)) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            delete pkg.packageManager;
            fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');
            console.log(\`\${file} atualizado\`);
          }
        });
        "

    - name: Install dependencies (root)
      run: npm install

    - name: Install dependencies (example)
      run: |
        cd example
        npm install

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
        working-directory: example/ios

    - name: Install CocoaPods
      run: |
        cd example/ios
        if [ ! -f Gemfile ]; then
          bundle init
          bundle add cocoapods
        fi
        bundle install
        bundle exec pod install

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'

    - name: Create Export Options
      run: |
        cat > exportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>development</string>
          <key>teamID</key>
          <string>reactmaan</string>
          <key>compileBitcode</key>
          <false/>
          <key>uploadSymbols</key>
          <false/>
        </dict>
        </plist>
        EOF

    - name: Build Archive
      run: |
        cd example/ios
        xcodebuild archive \
          -workspace example.xcworkspace \
          -scheme example \
          -archivePath ${{ github.workspace }}/build/example.xcarchive \
          -configuration Debug \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          || xcodebuild archive \
          -project *.xcodeproj \
          -scheme example \
          -archivePath ${{ github.workspace }}/build/example.xcarchive \
          -configuration Debug \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY=""

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath ${{ github.workspace }}/build/example.xcarchive \
          -exportPath ${{ github.workspace }}/build \
          -exportOptionsPlist exportOptions.plist \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: example-app.ipa
        path: ${{ github.workspace }}/build/*.ipa
        retention-days: 7
