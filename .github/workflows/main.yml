name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Yarn Classic
      run: |
        # Desativa corepack para evitar interferência
        corepack disable
        npm install -g yarn@1.22.22
        yarn --version

    - name: Fix package.json files
      run: |
        # Remove packageManager field e ajusta para Yarn 1
        node -e "
        const fs = require('fs');
        ['package.json', 'example/package.json'].forEach(file => {
          if (fs.existsSync(file)) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            delete pkg.packageManager;
            fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');
            console.log(file + ' atualizado');
          }
        });
        "

    - name: Install dependencies (root)
      run: |
        # Se existe yarn.lock, usa --frozen-lockfile, senão gera um novo
        if [ -f yarn.lock ]; then
          yarn install --frozen-lockfile
        else
          yarn install
        fi

    - name: Install dependencies (example)
      working-directory: example
      run: |
        if [ -f yarn.lock ]; then
          yarn install --frozen-lockfile
        else
          yarn install
        fi

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'

    - name: Install CocoaPods
      working-directory: example/ios
      run: |
        if [ ! -f Gemfile.lock ]; then
          bundle init
          bundle add cocoapods
        fi
        bundle install
        bundle exec pod install

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'

    - name: Create Export Options
      run: |
        cat > exportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>development</string>
          <key>teamID</key>
          <string>pmamama</string>
          <key>compileBitcode</key>
          <false/>
          <key>uploadSymbols</key>
          <false/>
        </dict>
        </plist>
        EOF

    - name: Find correct workspace and scheme
      working-directory: example/ios
      run: |
        echo "Procurando workspace e scheme..."
        
        # Lista workspaces disponíveis
        WORKSPACES=$(find . -name "*.xcworkspace" -maxdepth 1 -not -name "Pods.xcworkspace")
        echo "Workspaces: $WORKSPACES"
        
        # Pega o primeiro workspace que não seja Pods
        WORKSPACE=$(echo "$WORKSPACES" | head -1 | xargs basename)
        echo "Usando workspace: $WORKSPACE"
        echo "WORKSPACE_NAME=$WORKSPACE" >> $GITHUB_ENV
        
        # Lista schemes disponíveis
        if [ -n "$WORKSPACE" ]; then
          SCHEMES=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A 100 "Schemes:" | grep -v "Schemes:" | grep -v "^$" | head -5)
          echo "Schemes disponíveis:"
          echo "$SCHEMES"
          SCHEME=$(echo "$SCHEMES" | head -1 | xargs)
          echo "Usando scheme: $SCHEME"
          echo "SCHEME_NAME=$SCHEME" >> $GITHUB_ENV
        fi

    - name: Build Archive
      working-directory: example/ios
      run: |
        echo "Construindo com workspace: $WORKSPACE_NAME"
        echo "Construindo com scheme: $SCHEME_NAME"
        
        xcodebuild archive \
          -workspace "$WORKSPACE_NAME" \
          -scheme "$SCHEME_NAME" \
          -archivePath ${{ github.workspace }}/build/App.xcarchive \
          -configuration Debug \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          ONLY_ACTIVE_ARCH=NO

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath ${{ github.workspace }}/build/App.xcarchive \
          -exportPath ${{ github.workspace }}/build \
          -exportOptionsPlist exportOptions.plist \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: app.ipa
        path: ${{ github.workspace }}/build/*.ipa
        retention-days: 7

    - name: Upload Archive
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: xcode-archive
        path: ${{ github.workspace }}/build/*.xcarchive
        retention-days: 3
