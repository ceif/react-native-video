name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Permite execução manual

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Enable Corepack
      run: |
        corepack enable
        corepack prepare yarn@stable --activate

    - name: Check package.json packageManager field
      run: |
        echo "Package manager configurado:"
        cat package.json | grep packageManager || echo "Sem campo packageManager"
        
    - name: Fix packageManager if needed
      run: |
        # Remove o campo packageManager problemático
        cd ${{ github.workspace }}
        node -e "
        const fs = require('fs');
        const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
        delete pkg.packageManager;
        fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
        "
        # Também verifica na pasta example
        if [ -f example/package.json ]; then
          cd example
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          delete pkg.packageManager;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        fi

    - name: Install dependencies (root)
      run: |
        yarn install --frozen-lockfile || yarn install

    - name: Install dependencies (example)
      run: |
        cd example
        yarn install --frozen-lockfile || yarn install

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
        working-directory: example/ios

    - name: Install CocoaPods
      run: |
        cd example/ios
        # Verifica se já tem Gemfile
        if [ ! -f Gemfile ]; then
          bundle init
          bundle add cocoapods
        fi
        bundle install
        bundle exec pod install || pod install

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'

    - name: Create Export Options
      run: |
        cat > exportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>development</string>
          <key>teamID</key>
          <string>reactmaan</string>
          <key>compileBitcode</key>
          <false/>
          <key>uploadSymbols</key>
          <false/>
        </dict>
        </plist>
        EOF

    - name: Find correct workspace and scheme
      run: |
        cd example/ios
        echo "Workspaces disponíveis:"
        find . -name "*.xcworkspace" -maxdepth 1
        echo "Projects disponíveis:"
        find . -name "*.xcodeproj" -maxdepth 1
        
        # Extrai nomes para usar nos próximos passos
        WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -1 | sed 's/\.\///')
        echo "WORKSPACE_NAME=$WORKSPACE" >> $GITHUB_ENV
        
        # Tenta encontrar o scheme
        if [ -n "$WORKSPACE" ]; then
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | grep -A 10 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          echo "SCHEME_NAME=$SCHEME" >> $GITHUB_ENV
        fi

    - name: Build Archive
      run: |
        cd example/ios
        xcodebuild archive \
          -workspace "$WORKSPACE_NAME" \
          -scheme "$SCHEME_NAME" \
          -archivePath ${{ github.workspace }}/build/example.xcarchive \
          -configuration Debug \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
        || xcodebuild archive \
          -project *.xcodeproj \
          -scheme "$SCHEME_NAME" \
          -archivePath ${{ github.workspace }}/build/example.xcarchive \
          -configuration Debug \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY=""

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath ${{ github.workspace }}/build/example.xcarchive \
          -exportPath ${{ github.workspace }}/build \
          -exportOptionsPlist exportOptions.plist \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: example-app.ipa
        path: ${{ github.workspace }}/build/*.ipa
        retention-days: 7

    - name: Upload Archive
      uses: actions/upload-artifact@v4
      with:
        name: xcode-archive
        path: ${{ github.workspace }}/build/example.xcarchive
        retention-days: 3
