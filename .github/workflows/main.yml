name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Yarn Classic
      run: |
        corepack disable
        npm install -g yarn@1.22.22

    - name: Setup React Native environment
      run: |
        # Instala React Native CLI globalmente
        npm install -g react-native-cli || true
        npm install -g @react-native-community/cli || true

    - name: Install example dependencies directly
      working-directory: example
      run: |
        # Remove packageManager problemático
        node -e "
        const fs = require('fs');
        if (fs.existsSync('package.json')) {
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          delete pkg.packageManager;
          
          // Substitui dependências locais por versões do npm
          if (pkg.dependencies) {
            Object.keys(pkg.dependencies).forEach(key => {
              if (key.startsWith('@react-native-video/')) {
                console.log('Substituindo', key, 'por versão npm');
                pkg.dependencies[key] = 'latest';
              }
            });
          }
          
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
        }
        "
        
        # Instala dependências
        yarn install --no-lockfile

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'

    - name: Install CocoaPods
      working-directory: example/ios
      run: |
        if [ ! -f Gemfile.lock ]; then
          bundle init
          bundle add cocoapods
        fi
        bundle install
        bundle exec pod install

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'

    - name: Create Export Options
      run: |
        cat > exportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>development</string>
          <key>teamID</key>
          <string>YOUR_TEAM_ID</string>
          <key>compileBitcode</key>
          <false/>
          <key>uploadSymbols</key>
          <false/>
        </dict>
        </plist>
        EOF

    - name: Build and Export IPA
      working-directory: example/ios
      run: |
        WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 -not -name "Pods.xcworkspace" | head -1 | xargs basename)
        SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A 10 "Schemes:" | grep -v "Schemes:" | grep -v "^$" | head -1 | xargs)
        
        echo "Workspace: $WORKSPACE | Scheme: $SCHEME"
        
        xcodebuild archive \
          -workspace "$WORKSPACE" \
          -scheme "$SCHEME" \
          -archivePath ${{ github.workspace }}/build/App.xcarchive \
          -configuration Debug \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          ONLY_ACTIVE_ARCH=NO

        xcodebuild -exportArchive \
          -archivePath ${{ github.workspace }}/build/App.xcarchive \
          -exportPath ${{ github.workspace }}/build \
          -exportOptionsPlist ${{ github.workspace }}/exportOptions.plist \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: app.ipa
        path: ${{ github.workspace }}/build/*.ipa
        retention-days: 7
